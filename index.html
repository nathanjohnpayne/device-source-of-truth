<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Device Source of Truth</title>
    <meta name="description" content="Disney Streaming's system of record for NCP/ADK partner device data — hardware specs, certifications, telemetry, and deployment intelligence." />
    <meta property="og:title" content="Device Source of Truth" />
    <meta property="og:description" content="Disney Streaming's system of record for NCP/ADK partner device data — hardware specs, certifications, telemetry, and deployment intelligence." />
    <meta property="og:image" content="https://device-source-of-truth.web.app/og-image.png" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://device-source-of-truth.web.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Device Source of Truth" />
    <meta name="twitter:description" content="Disney Streaming's system of record for NCP/ADK partner device data — hardware specs, certifications, telemetry, and deployment intelligence." />
    <meta name="twitter:image" content="https://device-source-of-truth.web.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        var r = document.getElementById('root');
        if (r && !r.children.length) {
          r.innerHTML = '<div style="padding:2rem;font-family:monospace">' +
            '<h2 style="color:red">App failed to load</h2>' +
            '<pre style="white-space:pre-wrap;background:#f5f5f5;padding:1rem;border-radius:4px">' +
            (e.message || 'Unknown error') + '\n' + (e.filename || '') + ':' + (e.lineno || '') +
            '</pre></div>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var r = document.getElementById('root');
        if (r && !r.children.length) {
          r.innerHTML = '<div style="padding:2rem;font-family:monospace">' +
            '<h2 style="color:red">App failed to load (async)</h2>' +
            '<pre style="white-space:pre-wrap;background:#f5f5f5;padding:1rem;border-radius:4px">' +
            (e.reason && e.reason.stack ? e.reason.stack : String(e.reason || 'Unknown rejection')) +
            '</pre></div>';
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
