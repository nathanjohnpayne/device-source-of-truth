name: Test Suite

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-tests:
    name: Backend (API Contracts + Unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - name: Build @dst/contracts
        working-directory: packages/contracts
        run: npm ci && npm run build
      - name: Bundle contracts for functions
        run: mkdir -p .contracts/dist && cp ../packages/contracts/package.json .contracts/ && cp -r ../packages/contracts/dist/* .contracts/dist/
      - run: npm ci
      - run: npm test
        env:
          CI: true

  frontend-tests:
    name: Frontend (Smoke + Coercion)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - name: Build @dst/contracts
        working-directory: packages/contracts
        run: npm ci && npm run build
      - run: npm ci
      - run: npm run ui:consistency:check
        env:
          CI: true
      - run: npm test
        env:
          CI: true

  contract-gate:
    name: Contract Gate
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ] || [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "::error::Contract tests failed — merge blocked"
            exit 1
          fi
          echo "All contract tests passed"
