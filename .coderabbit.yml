# .coderabbit.yml — CodeRabbit configuration
# See https://docs.coderabbit.ai/configuration

language: en-US

tone_instructions: >-
  Focus on bugs, security issues, and correctness over style nitpicks.
  Flag any hardcoded credentials, exposed API keys, or Firebase security
  rule gaps. Keep comments actionable and concise.

reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  profile: assertive
  request_changes_workflow: false

  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: true
  collapse_walkthrough: true
  poem: false

  related_issues: true
  related_prs: true
  assess_linked_issues: true
  estimate_code_review_effort: true

  path_instructions:
    - path: "packages/contracts/**"
      instructions: >-
        This is the shared contracts package consumed by the main app
        and Cloud Functions. Changes here affect multiple consumers.
        Verify type exports are backwards-compatible, and flag any
        breaking changes to interfaces or enums.
    - path: "functions/src/**"
      instructions: >-
        Firebase Cloud Functions backend. Review for proper error
        handling, Firestore security implications, and ensure any
        data validation matches the contracts package types.
    - path: "src/lib/**"
      instructions: >-
        Core library code including Firebase client setup and shared
        utilities. Flag any changes to authentication flows or
        Firestore query patterns that could affect data access.
    - path: "src/components/specs/**"
      instructions: >-
        Device specification components are data-dense. Verify that
        spec fields render correctly and handle missing/null values.

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
